name: "smart_irrigation"
type: "python:3.11"

relationships:
    database: "db:postgresql"

# Add mounts for media files
mounts:
    'media':
        source: local
        source_path: media
    'logs':
        source: local
        source_path: logs

disk: 512

web:
    upstream:
        socket_family: unix
    commands:
        start: "gunicorn -w 4 -b unix:$SOCKET --timeout 120 smart_irrigation.wsgi:application"
    locations:
        "/":
            passthru: true
        "/static":
            root: "static"
            expires: 1h
            allow: true
        "/media":
            root: "media"
            expires: 1h
            allow: true
            scripts: false

hooks:
    build: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements_remote.txt
        mkdir -p media
        mkdir -p logs
        python manage.py collectstatic --noinput
        mkdir -p media/profile_pics
        chmod -R 777 media

    deploy: |
        python manage.py migrate

